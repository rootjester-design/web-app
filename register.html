<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign Up — MyClassRoom.LK</title>
<link rel="stylesheet" href="/css/global.css">
<style>
body{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:5rem 1.5rem 3rem}
.auth-wrap{width:100%;max-width:480px;position:relative;z-index:2}
.auth-card{padding:2.8rem 2.5rem;border-radius:26px}
.auth-logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:.45rem;margin-bottom:2rem}
.auth-logo span{color:var(--red)}
.auth-logo .logo-dot{width:6px;height:6px}
.auth-title{font-family:'Syne',sans-serif;font-size:1.85rem;font-weight:800;letter-spacing:-.03em;margin-bottom:.4rem}
.auth-sub{color:var(--text2);font-size:.9rem;margin-bottom:2rem;font-weight:300}
.auth-sub a{color:var(--red2);text-decoration:underline;text-underline-offset:2px}

/* strength meter */
.pw-strength{margin-top:.5rem;height:4px;background:rgba(255,255,255,.08);border-radius:50px;overflow:hidden}
.pw-strength-fill{height:100%;border-radius:50px;transition:width .35s,background .35s;width:0%}
.pw-strength-label{font-size:.75rem;color:var(--text3);margin-top:.3rem}

/* checkbox */
.check-row{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:1.2rem}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--red);flex-shrink:0;margin-top:.15rem}
.check-row label{font-size:.84rem;color:var(--text2)}

/* eye toggle */
.pw-eye{position:absolute;right:.9rem;bottom:.9rem;background:none;border:none;color:var(--text3);font-size:.95rem;cursor:none;padding:.15rem;transition:color .2s}
.pw-eye:hover{color:var(--red2)}

.divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;color:var(--text3);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

.auth-alt{text-align:center;margin-top:1.3rem;font-size:.87rem;color:var(--text3)}
.auth-alt a{color:var(--red2);font-weight:600}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-ring"></div>
<div class="blobs" style="position:fixed"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="auth-wrap">
  <div class="glass-card glow auth-card" style="animation:fadeUp .65s ease both">
    <a href="/" class="auth-logo"><div class="logo-dot"></div>My<span>ClassRoom</span>.LK</a>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Already have an account? <a href="/login">Log in here</a></p>

    <form id="reg-form" novalidate>
      <div class="input-group" id="grp-name">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" placeholder="e.g. Dilanka Silva" autocomplete="name" required>
        <span class="icon">👤</span>
        <div class="err" id="err-name">Please enter your full name (min 2 chars).</div>
      </div>

      <div class="input-group" id="grp-email">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        <span class="icon">✉️</span>
        <div class="err" id="err-email">Please enter a valid email address.</div>
      </div>

      <div class="input-group" id="grp-pw">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 number" autocomplete="new-password" required>
        <span class="icon">🔒</span>
        <button type="button" class="pw-eye" id="eye-pw" title="Show/hide password">👁</button>
        <div class="pw-strength"><div class="pw-strength-fill" id="pw-fill"></div></div>
        <div class="pw-strength-label" id="pw-label">—</div>
        <div class="err" id="err-pw">Password must be ≥8 chars with 1 uppercase and 1 number.</div>
      </div>

      <div class="input-group" id="grp-cpw">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" autocomplete="new-password" required>
        <span class="icon">🔒</span>
        <button type="button" class="pw-eye" id="eye-cpw" title="Show/hide">👁</button>
        <div class="err" id="err-cpw">Passwords do not match.</div>
      </div>

      <div class="check-row">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="#" style="color:var(--red2)">Terms of Service</a> and <a href="#" style="color:var(--red2)">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn btn-red" style="width:100%;justify-content:center;padding:1rem" id="reg-btn">
        <span id="reg-btn-text">Create My Account →</span>
        <span id="reg-spinner" style="display:none">Creating…</span>
      </button>
    </form>

    <div class="auth-alt">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/global.js"></script>
<script>
redirectIfLoggedIn('/dashboard');

// Password strength
const pwInput = document.getElementById('password');
const pwFill  = document.getElementById('pw-fill');
const pwLabel = document.getElementById('pw-label');
pwInput.addEventListener('input', () => {
  const s = checkPasswordStrength(pwInput.value);
  pwFill.style.width    = s.pct + '%';
  pwFill.style.background = s.color;
  pwLabel.textContent   = s.label;
  pwLabel.style.color   = s.color;
});

// Eye toggles
function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
}
document.getElementById('eye-pw').onclick  = () => toggleEye('password', this);
document.getElementById('eye-cpw').onclick = () => toggleEye('confirm_password', this);

// Validation helpers
function setValid(grpId)   { document.getElementById(grpId).classList.remove('invalid'); document.getElementById(grpId).classList.add('valid'); }
function setInvalid(grpId) { document.getElementById(grpId).classList.add('invalid'); document.getElementById(grpId).classList.remove('valid'); }
function clearState(grpId) { document.getElementById(grpId).classList.remove('invalid','valid'); }

// Form submit
document.getElementById('reg-form').addEventListener('submit', async e => {
  e.preventDefault();
  let ok = true;

  const name = document.getElementById('full_name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw  = document.getElementById('password').value;
  const cpw = document.getElementById('confirm_password').value;
  const terms = document.getElementById('terms').checked;

  if (name.length < 2) { setInvalid('grp-name'); ok=false; } else setValid('grp-name');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setInvalid('grp-email'); ok=false; } else setValid('grp-email');
  if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw)) { setInvalid('grp-pw'); ok=false; } else setValid('grp-pw');
  if (pw !== cpw) { setInvalid('grp-cpw'); ok=false; } else setValid('grp-cpw');
  if (!terms) { toast('You must agree to the Terms of Service.','error'); ok=false; }
  if (!ok) return;

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  document.getElementById('reg-btn-text').style.display='none';
  document.getElementById('reg-spinner').style.display='inline';

  const data = await api.post('/api/auth/register', { full_name:name, email, password:pw, confirm_password:cpw });

  btn.disabled = false;
  document.getElementById('reg-btn-text').style.display='inline';
  document.getElementById('reg-spinner').style.display='none';

  if (data.success) {
    setToken(data.token);
    toast('Account created! Redirecting…','success');
    setTimeout(() => window.location.href='/dashboard', 1200);
  } else {
    const msg = data.errors ? data.errors[0].msg : data.message;
    toast(msg || 'Registration failed.','error');
  }
});
</script>
</body>
</html>
