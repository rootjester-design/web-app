<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log In — MyClassRoom.LK</title>
<link rel="stylesheet" href="/css/global.css">
<style>
body{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:5rem 1.5rem 3rem}
.auth-wrap{width:100%;max-width:440px;position:relative;z-index:2}
.auth-card{padding:2.8rem 2.5rem;border-radius:26px;animation:fadeUp .65s ease both}
.auth-logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:.45rem;margin-bottom:2rem}
.auth-logo span{color:var(--red)}
.auth-title{font-family:'Syne',sans-serif;font-size:1.85rem;font-weight:800;letter-spacing:-.03em;margin-bottom:.4rem}
.auth-sub{color:var(--text2);font-size:.9rem;margin-bottom:2rem;font-weight:300}
.forgot{font-size:.82rem;color:var(--red2);float:right;margin-top:-.8rem;margin-bottom:.8rem;display:block;text-align:right}
.remember{display:flex;align-items:center;gap:.55rem;margin-bottom:1.4rem;font-size:.84rem;color:var(--text2)}
.remember input{accent-color:var(--red)}
.pw-eye{position:absolute;right:.9rem;bottom:.9rem;background:none;border:none;color:var(--text3);font-size:.95rem;cursor:none;transition:color .2s}
.pw-eye:hover{color:var(--red2)}
.auth-alt{text-align:center;margin-top:1.3rem;font-size:.87rem;color:var(--text3)}
.auth-alt a{color:var(--red2);font-weight:600}
.demo-box{background:rgba(232,0,14,.07);border:1px solid rgba(232,0,14,.2);border-radius:12px;padding:.9rem 1rem;margin-bottom:1.5rem;font-size:.82rem;color:var(--text2);line-height:1.6}
.demo-box strong{color:var(--red2)}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-ring"></div>
<div class="blobs" style="position:fixed"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="auth-wrap">
  <div class="glass-card glow auth-card">
    <a href="/" class="auth-logo"><div class="logo-dot"></div>My<span>ClassRoom</span>.LK</a>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub" style="margin-bottom:1.3rem">Don't have an account? <a href="/register" style="color:var(--red2);text-decoration:underline;text-underline-offset:2px">Sign up free</a></p>

    <!-- Demo credentials hint -->
    <div class="demo-box">
      🧪 <strong>Demo accounts:</strong><br>
      Student: <strong>student@myclassroom.lk</strong> / <strong>Student@1234</strong><br>
      Admin: <strong>admin@myclassroom.lk</strong> / <strong>Admin@1234</strong>
    </div>

    <form id="login-form" novalidate>
      <div class="input-group" id="grp-email">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        <span class="icon">✉️</span>
        <div class="err">Please enter a valid email address.</div>
      </div>

      <div class="input-group" id="grp-pw" style="margin-bottom:.5rem">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required>
        <span class="icon">🔒</span>
        <button type="button" class="pw-eye" id="eye-pw">👁</button>
        <div class="err">Password is required.</div>
      </div>

      <a href="#" class="forgot" id="forgot-link">Forgot password?</a>

      <div class="remember">
        <input type="checkbox" id="remember_me" name="remember_me">
        <label for="remember_me">Remember me for 7 days</label>
      </div>

      <button type="submit" class="btn btn-red" style="width:100%;justify-content:center;padding:1rem" id="login-btn">
        <span id="login-btn-text">Log In →</span>
        <span id="login-spinner" style="display:none">Logging in…</span>
      </button>
    </form>

    <div class="auth-alt">New to MyClassRoom.LK? <a href="/register">Create a free account</a></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/global.js"></script>
<script>
redirectIfLoggedIn('/dashboard');

document.getElementById('eye-pw').onclick = () => {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
};

document.getElementById('forgot-link').onclick = (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { toast('Enter your email first.','warning'); return; }
  toast('Password reset link sent! (Demo mode — not actually sent)','info');
};

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember_me = document.getElementById('remember_me').checked;
  let ok = true;

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('grp-email').classList.add('invalid'); ok=false; }
  else document.getElementById('grp-email').classList.remove('invalid');
  if (!password) { document.getElementById('grp-pw').classList.add('invalid'); ok=false; }
  else document.getElementById('grp-pw').classList.remove('invalid');
  if (!ok) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  document.getElementById('login-btn-text').style.display='none';
  document.getElementById('login-spinner').style.display='inline';

  const data = await api.post('/api/auth/login', { email, password, remember_me });

  btn.disabled = false;
  document.getElementById('login-btn-text').style.display='inline';
  document.getElementById('login-spinner').style.display='none';

  if (data.success) {
    setToken(data.token);
    toast('Login successful! Redirecting…','success');
    const redirect = data.user?.role === 'admin' ? '/admin' : '/dashboard';
    setTimeout(() => window.location.href = redirect, 1000);
  } else {
    toast(data.message || 'Login failed.','error');
  }
});
</script>
</body>
</html>
